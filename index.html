<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zyro Russia | Конструктор медиа-промокодов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="studio-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-main">Zyro</span><span class="brand-accent">Studio</span>
        <span class="brand-help">?</span>
      </div>

      <div class="toolbar">
        <button class="icon-button" id="undoButton" type="button" aria-label="Вернуть назад">&#8630;</button>
        <button class="icon-button" id="shuffleButton" type="button" aria-label="Случайный стиль">&#10227;</button>
        <button class="icon-button" id="resetButton" type="button" aria-label="Сбросить">&#8634;</button>
        <button class="icon-button active" id="gridButton" type="button" aria-label="Сетка">&#9638;</button>
        <button class="icon-button" id="alignButton" type="button" aria-label="Выравнивание">&#8801;</button>
        <button class="icon-button" id="strokeButton" type="button" aria-label="Обводка">&#9998;</button>
      </div>

      <div class="top-actions">
        <button class="action-button" id="addTextButton" type="button">T&nbsp;&nbsp;Добавить текст</button>
        <button class="action-button" id="addElementButton" type="button">&#10022;&nbsp;&nbsp;Добавить элемент</button>
        <button class="action-button" id="formatButton" type="button">&#9638;&nbsp;&nbsp;Формат</button>
        <button class="primary-action" id="downloadButton" type="button">&#8681;&nbsp;&nbsp;Скачать</button>
      </div>
    </header>

    <main class="workspace-layout">
      <section class="workspace">
        <div class="workspace-stage">
          <div class="canvas-wrap">
            <canvas id="promoCanvas" width="1400" height="780"></canvas>
          </div>
        </div>
      </section>

      <aside class="settings-panel">
        <div class="sidebar-title">Настройки холста</div>

        <section class="settings-block toggle-block">
          <div class="settings-row">
            <div>
              <div class="block-label">Показывать фон</div>
              <div class="block-help">Для прозрачного PNG</div>
            </div>
            <button class="toggle-button on" id="backgroundToggle" type="button" aria-pressed="true">ВКЛ</button>
          </div>
        </section>

        <section class="settings-block">
          <div class="block-header">
            <span class="block-title">Готовые пресеты</span>
            <span class="block-help">?</span>
          </div>
          <div class="preset-grid">
            <button class="chip-button active" type="button" data-style="style1">Стиль 1</button>
            <button class="chip-button" type="button" data-style="style2">Стиль 2</button>
            <button class="chip-button" type="button" data-style="style3">Стиль 3</button>
            <button class="chip-button" type="button" data-style="style4">Стиль 4</button>
          </div>
        </section>

        <section class="settings-block">
          <div class="block-header">
            <span class="block-title">Выбор сервера</span>
            <span class="block-help">?</span>
          </div>
          <div class="server-grid">
            <button class="outline-chip active" type="button" data-server="Москва">Москва</button>
            <button class="outline-chip" type="button" data-server="Питер">Питер</button>
            <button class="outline-chip" type="button" data-server="Екатеринбург">Екатеринбург</button>
          </div>
        </section>

        <section class="settings-block">
          <div class="block-header">
            <span class="block-title">Фигуры</span>
            <span class="block-help">?</span>
          </div>
          <div class="icon-grid">
            <button class="shape-button active" type="button" data-shape="square" aria-label="Квадрат"><span class="shape square"></span></button>
            <button class="shape-button" type="button" data-shape="circle" aria-label="Круг"><span class="shape circle"></span></button>
            <button class="shape-button" type="button" data-shape="triangle" aria-label="Треугольник"><span class="shape triangle"></span></button>
            <button class="shape-button" type="button" data-shape="star" aria-label="Звезда"><span class="shape star">&#9733;</span></button>
            <button class="shape-button" type="button" data-shape="grid" aria-label="Сетка"><span class="shape tiny-grid"></span></button>
          </div>
        </section>

        <section class="settings-block">
          <div class="block-header">
            <span class="block-title">Элементы</span>
            <span class="block-help">?</span>
          </div>
          <div class="icon-grid">
            <button class="element-button active" type="button" data-element="bear" aria-label="Логотип медведя">🐻</button>
            <button class="element-button" type="button" data-element="spark" aria-label="Вспышка">✦</button>
            <button class="element-button" type="button" data-element="shield" aria-label="Щит">🛡</button>
            <button class="element-button" type="button" data-element="crown" aria-label="Корона">♛</button>
            <button class="element-button" type="button" data-element="none" aria-label="Без элемента">□</button>
          </div>
        </section>

        <section class="settings-block">
          <div class="block-header">
            <span class="block-title">Слои</span>
            <span class="block-help">?</span>
          </div>
          <div class="layer-list">
            <div class="layer-item">
              <span>Стиль</span>
              <span class="layer-actions">&#128065;</span>
            </div>
            <div class="layer-item">
              <span>Текст</span>
              <span class="layer-actions">&#128065;</span>
            </div>
            <div class="layer-item">
              <span>Фон</span>
              <span class="layer-actions">&#128065;</span>
            </div>
          </div>
        </section>

        <section class="settings-block">
          <div class="block-header">
            <span class="block-title">Цвет фона</span>
            <span class="block-help">?</span>
          </div>
          <div class="swatch-row">
            <button class="swatch active" type="button" data-bg="#070911" style="--swatch:#070911" aria-label="Темно-синий"></button>
            <button class="swatch" type="button" data-bg="#162d4d" style="--swatch:#162d4d" aria-label="Синий"></button>
            <button class="swatch" type="button" data-bg="#2a2351" style="--swatch:#2a2351" aria-label="Фиолетовый"></button>
            <button class="swatch" type="button" data-bg="#20355b" style="--swatch:#20355b" aria-label="Сине-серый"></button>
          </div>
          <label class="upload-button" for="backgroundUpload">Загрузить фоновое фото</label>
          <input id="backgroundUpload" type="file" accept="image/*" hidden>
        </section>

        <section class="settings-block">
          <div class="field-group">
            <label class="field-label" for="promoCodeInput">Промокод</label>
            <input id="promoCodeInput" type="text" value="/promo > 2" maxlength="24">
          </div>
          <div class="field-group">
            <label class="field-label" for="footerInput">Нижняя строка</label>
            <input id="footerInput" type="text" value="скачать игру в тгк - @crmp_rage" maxlength="60">
          </div>
        </section>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
