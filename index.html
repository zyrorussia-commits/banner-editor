<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Баннер Москва</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="preview-block">
      <div class="preview-top">
        <div>
          <p class="label">Баннер</p>
          <h1>Москва</h1>
        </div>
        <button class="download-button" id="downloadButton" type="button">Скачать PNG</button>
      </div>

      <div class="canvas-wrap">
        <canvas id="promoCanvas" width="1280" height="720"></canvas>
      </div>
    </section>

    <section class="controls">
      <div class="panel">
        <p class="label">Стили</p>
        <div class="style-list">
          <button class="style-button" type="button" data-style="style1">Стиль 1</button>
          <button class="style-button" type="button" data-style="style2">Стиль 2</button>
          <button class="style-button" type="button" data-style="style3">Стиль 3</button>
          <button class="style-button" type="button" data-style="style4">Стиль 4</button>
        </div>
      </div>

      <div class="panel">
        <p class="label">Текст</p>
        <label class="field">
          <span>Промокод</span>
          <input id="promoInput" type="text" maxlength="24" value="/promo > 2">
        </label>
        <label class="field">
          <span>Нижняя строка</span>
          <input id="footerInput" type="text" maxlength="60" value="скачать игру в тгк @crmp_zyro">
        </label>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
