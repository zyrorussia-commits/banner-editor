<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zyro | Баннер Москва</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Unbounded:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="hero-copy">
        <div class="eyebrow">zyro promo builder</div>
        <h1>Собери баннер под Москву без лишнего мусора</h1>
        <p>Один сервер, четыре стиля и нормальный чистый экран. Стиль включается только после клика.</p>
      </div>

      <div class="hero-actions">
        <button class="button button-secondary" id="resetButton" type="button">Сбросить</button>
        <button class="button button-primary" id="downloadButton" type="button">Скачать PNG</button>
      </div>
    </section>

    <main class="layout">
      <section class="preview-panel">
        <div class="preview-head">
          <div>
            <div class="eyebrow">preview</div>
            <h2>Москва</h2>
          </div>
          <div class="status" id="statusLabel">Стиль не выбран</div>
        </div>

        <div class="canvas-shell">
          <canvas id="promoCanvas" width="1400" height="780"></canvas>
        </div>
      </section>

      <aside class="sidebar">
        <section class="card">
          <div class="card-head">
            <div class="eyebrow">server</div>
            <h3>Сервер</h3>
          </div>
          <div class="server-chip">Москва</div>
        </section>

        <section class="card">
          <div class="card-head">
            <div class="eyebrow">styles</div>
            <h3>Выбери стиль</h3>
          </div>

          <div class="style-grid">
            <button class="style-card" type="button" data-style="style1">
              <span class="style-preview style-preview-1"></span>
              <span class="style-name">Стиль 1</span>
            </button>
            <button class="style-card" type="button" data-style="style2">
              <span class="style-preview style-preview-2"></span>
              <span class="style-name">Стиль 2</span>
            </button>
            <button class="style-card" type="button" data-style="style3">
              <span class="style-preview style-preview-3"></span>
              <span class="style-name">Стиль 3</span>
            </button>
            <button class="style-card" type="button" data-style="style4">
              <span class="style-preview style-preview-4"></span>
              <span class="style-name">Стиль 4</span>
            </button>
          </div>
        </section>

        <section class="card">
          <div class="card-head">
            <div class="eyebrow">text</div>
            <h3>Текст баннера</h3>
          </div>

          <label class="field">
            <span>Промокод</span>
            <input id="promoInput" type="text" maxlength="24" value="/promo > 2">
          </label>

          <label class="field">
            <span>Нижняя строка</span>
            <input id="footerInput" type="text" maxlength="60" value="скачать игру в тгк @crmp_zyro">
          </label>
        </section>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
